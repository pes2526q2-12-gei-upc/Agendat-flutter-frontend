    Perfil
    Pestanya 5 de 5
- tapOn:
    point: 50%, 50%
- swipe:
    direction: UP
- tapOn: Convidar
- tapOn: |- # Sessió de l'esdeveniment de test-event-view-and-session
    divendres, 29 de maig de 2026
    A les 13:00
- tapOn: |-
    MZ
    1
    Mark Zuckerberg
    @Casteller15
- tapOn: Enviar 1 invitació
- assertVisible: Invitació enviada correctament.
- waitForAnimationToEnd
- waitForAnimationToEnd
- tapOn: Convidar
- tapOn: |- # Sessió de l'esdeveniment de test-event-view-and-session
    divendres, 29 de maig de 2026
    A les 13:00
- assertVisible: |-
    MZ
    1
    Mark Zuckerberg
    @Casteller15
    Pendent
- tapOn:
