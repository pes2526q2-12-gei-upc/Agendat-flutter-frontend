# que així ja hi ha una sessió creada
appId: com.example.agendat
---
- launchApp:
    clearState: true

# Happy path de login de Mark Zuckerberg
- tapOn: El teu nom d'usuari
- inputText: Casteller15
- tapOn: La teva contrasenya
- inputText: k.87_oP[
- pressKey: Enter
- waitForAnimationToEnd
- assertNotVisible: Inicia sessió per continuar

# Happy path de friend request
- tapOn:
    point: 5%,11%
- tapOn: |-
    1
    Social
    Pestanya 4 de 5

- tapOn: Cerca un xat
- inputText: Elon
- tapOn: |-
    1
    Elon Musk
    @Casteller16

- tapOn: Enviar sol·licitud d'amistat
- assertVisible: Sol·licitud d'amistat enviada.
- waitForAnimationToEnd
- tapOn: Sol·licitud enviada · Cancel·lar
- assertVisible: Sol·licitud d'amistat cancel·lada.
- tapOn: Enviar sol·licitud d'amistat

# Happy path de logout
- tapOn: Enrere
- tapOn: |-
    Perfil
    Pestanya 5 de 5
- tapOn: Tancar sessió
- tapOn: Tancar sessió

# Happy path de login amb Elon Musk
- tapOn: El teu nom d'usuari
- inputText: Casteller16
- tapOn: La teva contrasenya
- inputText: k.87_oP[
- pressKey: Enter

# Happy path d'acceptar friend request
