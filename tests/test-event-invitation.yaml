- tapOn: Enrere

# Happy path de logout
- tapOn: Tancar sessió
- tapOn: Tancar sessió

# Happy path de login de Mark Zuckerberg
- tapOn: El teu nom d'usuari
- inputText: Casteller15
- tapOn: La teva contrasenya
- inputText: k.87_oP[
- pressKey: Enter

# Happy path d'acceptar invitació a esdeveniment
- tapOn:
    point: 70%, 94%
- tapOn:
    point: 50%, 23%
- tapOn: Acceptar
- assertVisible: Invitació acceptada. Assistència registrada.
- tapOn: Enrere
- tapOn: |-
    Perfil
    Pestanya 5 de 5
- assertNotVisible: |-
    Assistits
    0
    Pestanya 1 de 2

# Happy path d'eliminar amistat
- tapOn: |-
    Social
    Pestanya 4 de 5
- tapOn: Els meus amics
- tapOn: |-
    1
    Elon Musk
    @Casteller16

- tapOn: Eliminar amistat
