appId: com.example.agendat
---
- launchApp:
    clearState: true

- tapOn: Registra't
- assertVisible: Crea el teu compte

# Happy path
- tapOn: Nom d'usuari únic
- inputText: Casteller16
- tapOn: El teu nom
- inputText: Elon Musk
- tapOn: exemple@correu.cat
- inputText: Casteller16@gmail.com
- tapOn: Mín. 8 caràcters, majúscula, minúscula, número i caràcter especial
- inputText: k.87_oP[
- pressKey: Enter
- inputText: k.87_oP[
- swipe:
    direction: UP
- tapOn: Crear compte
- assertVisible: Verifica el compte
- tapOn: Enrere
- waitForAnimationToEnd

