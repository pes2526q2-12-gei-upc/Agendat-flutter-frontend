# Augmentar en un número el nom i el correu cada
# vegada que es vulgui executar el happy path
appId: com.example.agendat
---
- launchApp:
    clearState: true

- assertVisible: Inicia sessió
- tapOn: Registra't
- assertVisible: Crea el teu compte

# Happy path
- tapOn: Nom d'usuari únic
- inputText: Casteller16 # Augmentar aquí
- tapOn: El teu nom
- inputText: Elon Musk
- tapOn: exemple@correu.cat
- inputText: Casteller16@gmail.com # Augmentar aquí
- tapOn: Mínim 8 caràcters
- inputText: k.87_oP[
- pressKey: Enter
- inputText: k.87_oP[
- pressKey: Enter
- waitForAnimationToEnd
- assertVisible: Revisa el teu correu
- tapOn: Enrere
- waitForAnimationToEnd

# Error 1: falten camps (username buit)
- tapOn: Registra't
- tapOn: exemple@correu.cat
- inputText: Casteller99@gmail.com
- tapOn: Mínim 8 caràcters
- inputText: k.87_oP[
- pressKey: Enter
- inputText: k.87_oP[
- pressKey: Enter
- assertVisible: Introdueix un nom d'usuari.
- waitForAnimationToEnd
- tapOn: Enrere

