name: Flutter CI

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened]

jobs:
  test-and-sonar:
    name: Test and SonarCloud Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codi
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessari per a l'anàlisi de SonarCloud

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instal·lar dependències
        run: flutter pub get

      - name: Executar Tests amb Cobertura
        # Genera el fitxer coverage/lcov.info que llegirà SonarCloud
        run: flutter test --coverage

      - name: SonarCloud Scan
        # Hem actualitzat a la versió v5.0.0 per evitar el warning de 'deprecated'
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}